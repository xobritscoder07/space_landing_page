<!doctype html>
<html>
  <head lang="en">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>space landing page</title>
    <link rel="stylesheet" href="space_landing_style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Orbitron:wght@700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <div class="header">
        <div class="nav-left-side">
          <img
            class="logo"
            src="space_landing_images/nova-horizon-logo.png"
            alt="Nova horizon"
          />
          <p class="logo-name">Nova Horizon</p>
        </div>
        <div class="nav-right-side">
          <button class="Home">Home</button>
          <button class="About-us">About us</button>
          <button class="Features">Features</button>
          <button class="Sign-up">Sign-up</button>
        </div>
      </div>
    </header>

    <main>
      <section class="hero">
        <div class="hero-left">
          <p class="hero-title">Beyond Earth. Beyond limits.</p>
          <p class="hero-desc">
            From launching next-generation satellites to planning future
            missions beyond Earth, we push the boundaries of innovation to
            connect, protect, and inspire the world through space technology.
          </p>
        </div>

        <div class="hero-right">
          <!-- image -->
        </div>
      </section>
    </main>
  </body>
</html>
